# Video to SRT - Docker Compose 配置
# 一键启动: docker-compose up

services:
  video-to-srt:
    build: .
    container_name: video-to-srt
    ports:
      - "8501:8501"
    volumes:
      # 持久化输出目录
      - ./output:/app/output
      # 持久化临时文件
      - ./temp:/app/temp
    environment:
      - WHISPER_MODEL=small
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
